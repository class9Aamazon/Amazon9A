  .header p {

  .logo {

    margin-left: -5px;

    margin-right: 10px;
  }

  /* NAV */
  .nav {
    position: relative;
    display: flex;
    justify-content: center;

    border-radius: 30px;
    overflow: hidden;

  }

  .nav a {

    padding: 10px 0;

  .footer {

}

}

.footer-social span {
  font-size: 22px;
  margin: 0 8px;
  cursor: pointer;

}

.footer-social span:hover {
  color: white;
}

.footer-copy {
  font-size: 12px;
  color: #aaa;
}
.footer-social {
  display: flex;
  justify-content: center;
  align-items: center;
}

.footer-social a {
  font-size: 28px;
  color: #ccc;
  text-decoration: none;
  transition: 0.3s;
}

/* JARAK ICON */
.footer-social a:first-child {
  margin-right: 15px;
}

.footer-social a:last-child {
  margin-left: 15px;
}

/* PEMISAH | */

  color: #aaa;

.footer-social a:hover {
  transform: scale(1.2);
}

.footer-social a:hover .fa-instagram {
  color: #E1306C;
}

.footer-social a:hover .fa-tiktok {
